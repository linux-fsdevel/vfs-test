name: sync-vfs
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: vfs-mutations
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          path: ci-source

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: linux-fsdevel
          repositories: vfs

      - name: Sync kernel.org to GitHub with CI files
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          PUSH_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/linux-fsdevel/vfs.git"

          git clone --no-tags --no-single-branch \
            https://git.kernel.org/pub/scm/linux/kernel/git/vfs/vfs.git \
            /tmp/vfs-sync

          cd /tmp/vfs-sync
          git config user.name "ml2pr"
          git config user.email "ml2pr@linux-fsdevel"
          git remote add github "${PUSH_URL}"

          # Fetch existing .ci branches from GitHub so we can compare trees
          git fetch github \
            refs/heads/vfs.all.ci:refs/remotes/github/vfs.all.ci \
            refs/heads/vfs.base.ci:refs/remotes/github/vfs.base.ci \
            refs/heads/vfs.fixes.ci:refs/remotes/github/vfs.fixes.ci \
            2>/dev/null || true

          CI_PUSH_REFS=""

          for branch in vfs.all vfs.base vfs.fixes; do
            echo "::group::Syncing ${branch}"
            git checkout "${branch}"

            # Fork .ci branch from the clean mirror
            git checkout -B "${branch}.ci"

            # Remove any stale CI files, then copy fresh ones from vfs-test
            rm -rf .github ci
            mkdir -p .github/workflows .github/scripts

            cp -r "${GITHUB_WORKSPACE}/ci-source/.github/workflows/ci/"* .github/workflows/
            cp -r "${GITHUB_WORKSPACE}/ci-source/.github/scripts/"* .github/scripts/
            cp -r "${GITHUB_WORKSPACE}/ci-source/ci" ci

            git add -f .github/workflows .github/scripts ci
            if ! git diff --cached --quiet; then
              git commit --no-gpg-sign -m "ci: add CI infrastructure [ml2pr]"
            fi

            # Only push .ci branch if its tree differs from the remote;
            # preserving the existing commit SHA prevents pw/ branches
            # from diverging when nothing actually changed.
            local_tree=$(git rev-parse HEAD^{tree})
            remote_tree=$(git rev-parse "github/${branch}.ci^{tree}" 2>/dev/null || echo "none")
            if [ "${local_tree}" != "${remote_tree}" ]; then
              CI_PUSH_REFS="${CI_PUSH_REFS} ${branch}.ci"
            else
              echo "::notice::${branch}.ci tree unchanged, skipping push"
            fi

            echo "::endgroup::"
          done

          # Always push clean mirrors; only push .ci branches that changed
          # shellcheck disable=SC2086
          git push --force github vfs.all vfs.base vfs.fixes ${CI_PUSH_REFS}
