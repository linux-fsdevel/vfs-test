name: ml2pr
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

concurrency:
  group: vfs-mutations
  cancel-in-progress: false

jobs:
  bridge:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: linux-fsdevel
          repositories: vfs

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install b4
        run: pip install b4==0.14.2

      - name: Restore vfs clone cache
        uses: actions/cache@v5
        with:
          path: /tmp/ml2pr-vfs-cache
          key: vfs-clone

      - name: Run ml2pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          VFS_CLONE_DIR: /tmp/ml2pr-vfs-cache
        run: node scripts/ml2pr.mjs
